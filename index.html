
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=600, initial-scale=1, user-scalable=no">
<meta name="mrbd-web-app-capable" content="yes">
<link rel="icon" href="/icon-96.png" sizes="96x96">
<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
<title>Bearing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --bg:#000000;
    --phosphor:#3dffa0;
    --phosphor-dim:#123a26;
    --amber:#ffb400;
    --amber-dim:#3a2900;
    --ink:#eafff2;
  }
  *{box-sizing:border-box; margin:0; padding:0; outline:none; -webkit-tap-highlight-color:transparent;}
  html,body{
    width:600px; height:600px; overflow:hidden;
    background:var(--bg);
    font-family: ui-sans-serif, "Arial Narrow", Arial, sans-serif;
    color:var(--phosphor);
    outline:none; border:none;
  }
  #stage{
    position:relative; width:600px; height:600px; background:#000;
  }
  .leaflet-container, .leaflet-container:focus{ outline:none !important; }

  /* ---------- MAP ---------- */
  #mapClip{
    position:absolute; left:0; top:70px; width:600px; height:530px;
    overflow:hidden; background:#000;
  }
  #mapRotator{
    position:absolute;
    left:50%; top:50%;
    width:900px; height:900px;
    margin-left:-450px; margin-top:-450px;
    transition: transform 0.6s ease-out;
    transform: rotate(0deg);
  }
  #map{ position:absolute; left:150px; top:150px; width:600px; height:600px; }
  .leaflet-tile-pane{ filter: brightness(3.2) contrast(2.4); opacity:1; }

  #userMarker{
    position:absolute; left:50%; top:50%; width:0; height:0;
    pointer-events:none; z-index:500;
  }
  #userMarker svg{
    position:absolute; left:-16px; top:-16px; width:32px; height:32px;
    filter: drop-shadow(0 0 4px var(--phosphor));
    transition: transform 0.2s linear;
  }

  #attribution{
    position:absolute; right:4px; bottom:2px; font-size:7px;
    color: rgba(255,255,255,0.28); letter-spacing:0.2px;
    z-index:600; pointer-events:none;
  }

  #gpsStatus{
    position:absolute; left:0; top:70px; width:600px; height:530px;
    display:flex; align-items:center; justify-content:center;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size:15px; letter-spacing:2px; color:var(--phosphor);
    text-shadow:0 0 6px var(--phosphor);
    background:#000; z-index:700;
    text-align:center; line-height:1.9;
  }
  #gpsStatus span{ opacity:0.6; }
  #gpsStatus .prompt{ opacity:1; color:var(--amber); text-shadow:0 0 6px var(--amber); }

  /* ---------- HEADING TAPE (top) ---------- */
  #headingTape{
    position:absolute; left:0; top:0; width:600px; height:70px;
    background:#000; border-bottom:1px solid var(--phosphor-dim);
    z-index:800;
  }
  #headingCanvas{ position:absolute; left:0; top:0; }
  #headingPointer{
    position:absolute; left:296px; top:0; width:0; height:0;
    border-left:7px solid transparent; border-right:7px solid transparent;
    border-top:10px solid var(--amber);
    filter: drop-shadow(0 0 3px var(--amber));
  }
  #modeLabel{
    position:absolute; left:0; top:52px; width:600px; text-align:center;
    font-size:9px; letter-spacing:3px; color:var(--phosphor); opacity:0.55;
    font-family: ui-monospace, monospace;
  }

  /* ---------- SPEED TAPE (left) ---------- */
  #speedTape{
    position:absolute; left:0; top:70px; width:74px; height:530px;
    background:#000; border-right:1px solid var(--phosphor-dim);
    z-index:800; overflow:hidden;
  }
  #speedCanvas{ position:absolute; left:0; top:0; }
  #speedPointer{
    position:absolute; left:0; top:265px; width:0; height:0;
    border-top:8px solid transparent; border-bottom:8px solid transparent;
    border-left:9px solid var(--amber);
    filter: drop-shadow(0 0 3px var(--amber));
  }
  #speedReadout{
    position:absolute; left:0; top:243px; width:70px; text-align:center;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  #speedReadout .num{ font-size:26px; font-weight:600; line-height:1; color:var(--amber); text-shadow:0 0 5px var(--amber); }
  #speedReadout .unit{ font-size:9px; letter-spacing:2px; opacity:0.6; }

  /* ---------- CONTROLS ---------- */
  #controls{
    position:absolute; right:8px; top:80px; z-index:900;
    display:flex; flex-direction:column; gap:8px; align-items:flex-end;
  }
  .btn{
    font-family: ui-monospace, monospace;
    font-size:10px; letter-spacing:1.5px;
    color:var(--phosphor); background:rgba(0,0,0,0.55);
    border:1px solid var(--phosphor-dim);
    padding:6px 9px; border-radius:3px;
    text-align:right; line-height:1.3;
    min-width:78px;
  }
  .btn .sub{ display:block; font-size:8px; opacity:0.55; letter-spacing:1px; margin-top:1px; }
  .btn.focused{
    border-color:var(--amber); color:var(--amber);
    box-shadow:0 0 8px rgba(255,180,0,0.5);
  }

  #zoomCluster{ display:flex; gap:8px; }
  .zoomBtn{
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--phosphor-dim);
    background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    color:var(--phosphor); font-size:19px; line-height:1;
    font-family: ui-monospace, monospace;
  }
  .zoomBtn.focused{
    border-color:var(--amber); color:var(--amber);
    box-shadow:0 0 8px rgba(255,180,0,0.5);
  }

  #mediaBtn{
    position:absolute; right:8px; bottom:8px; z-index:900;
    width:56px; height:56px; border-radius:50%;
    border:1px solid var(--phosphor-dim);
    background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    color:var(--phosphor); font-size:20px;
  }
  #mediaBtn.focused{
    border-color:var(--amber); color:var(--amber);
    box-shadow:0 0 10px rgba(255,180,0,0.55);
  }
</style>
</head>
<body>
<div id="stage">

  <div id="mapClip">
    <div id="mapRotator">
      <div id="map"></div>
    </div>
    <div id="userMarker">
      <svg viewBox="0 0 32 32"><polygon points="16,3 25,27 16,21 7,27" fill="currentColor"/></svg>
    </div>
  </div>
  <div id="gpsStatus"><span class="prompt">PRESS ANY BUTTON<br>TO START</span></div>
  <div id="attribution">MAP &copy; OSM &copy; CARTO</div>

  <div id="headingTape">
    <canvas id="headingCanvas" width="600" height="52"></canvas>
    <div id="headingPointer"></div>
    <div id="modeLabel">NORTH UP</div>
  </div>

  <div id="speedTape">
    <canvas id="speedCanvas" width="70" height="530"></canvas>
    <div id="speedPointer"></div>
    <div id="speedReadout"><div class="num" id="speedNum">0</div><div class="unit">MPH</div></div>
  </div>

  <div id="controls">
    <div class="btn focused" id="compassBtn" tabindex="0">HEADING<span class="sub">◀ NORTH UP ▶</span></div>
    <div id="zoomCluster">
      <div class="zoomBtn" id="zoomInBtn" tabindex="0">&#43;</div>
      <div class="zoomBtn" id="zoomOutBtn" tabindex="0">&#8722;</div>
    </div>
  </div>

  <div id="mediaBtn" tabindex="0">&#9199;</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function(){

  // ---------------- STATE ----------------
  var headingUp = localStorage.getItem('bearing-mode') === 'headingUp';
  var focusIndex = 0; // 0 = compass btn, 1 = media btn
  var focusEls = [
    document.getElementById('compassBtn'),
    document.getElementById('zoomInBtn'),
    document.getElementById('zoomOutBtn'),
    document.getElementById('mediaBtn')
  ];

  var currentHeading = 0;      // degrees, 0 = true north
  var lastCompassUpdate = 0;
  var gpsHeading = null;
  var currentSpeedMph = 0;
  var lastFix = null;

  var isPlaying = false;
  var silentAudio = new Audio();
  silentAudio.loop = true;
  silentAudio.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";

  var map = null; // set once Leaflet initializes successfully, below

  // ---------------- D-PAD NAVIGATION ----------------
  // Wired up FIRST, before any Leaflet/network-dependent code. If a later
  // section throws (e.g. the map CDN fails to load on-device), the input
  // listener is already attached and the glasses stay responsive instead
  // of the whole script silently dying before this ever runs.
  function setFocus(i){
    focusEls.forEach(function(el){ el.classList.remove('focused'); });
    focusIndex = i;
    focusEls[focusIndex].classList.add('focused');
  }
  setFocus(0);

  function safeZoomIn(){ try{ if(map) map.zoomIn(); }catch(e){} }
  function safeZoomOut(){ try{ if(map) map.zoomOut(); }catch(e){} }

  document.addEventListener('keydown', function(e){
    // Cheap + idempotent: internally guarded, so safe to call on every
    // keypress. This ensures permission requests always ride along on a
    // real user gesture, and lets a denied/timed-out fix retry on the
    // wearer's next button press.
    try{ requestOrientationPermission(); }catch(e){}
    try{ startGeolocation(); }catch(e){}
    switch(e.key){
      case 'ArrowLeft':
        setFocus((focusIndex - 1 + focusEls.length) % focusEls.length);
        e.preventDefault();
        break;
      case 'ArrowRight':
        setFocus((focusIndex + 1) % focusEls.length);
        e.preventDefault();
        break;
      case 'Enter':
        try{
          if(focusIndex === 0){ toggleMode(); }
          else if(focusIndex === 1){ safeZoomIn(); }
          else if(focusIndex === 2){ safeZoomOut(); }
          else { toggleMedia(); }
        }catch(e){}
        e.preventDefault();
        break;
      case 'ArrowUp':
        safeZoomIn();
        e.preventDefault();
        break;
      case 'ArrowDown':
        safeZoomOut();
        e.preventDefault();
        break;
    }
  });

  // ---------------- MAP ----------------
  try{
    map = L.map('map', {
      zoomControl:false, attributionControl:false,
      dragging:false, touchZoom:false, scrollWheelZoom:false,
      doubleClickZoom:false, boxZoom:false, keyboard:false, tap:false
    }).setView([0,0], 15);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains:'abcd', maxZoom:19
    }).addTo(map);

    // Leaflet makes its container focusable (tabindex=0) by default for
    // accessibility, even with keyboard interaction disabled — that can
    // trigger a native/browser focus ring around the whole map. We don't
    // need it focusable since all input is handled by our own D-pad listener.
    map.getContainer().removeAttribute('tabindex');
    map.getContainer().style.outline = 'none';
  }catch(mapErr){
    map = null;
    document.getElementById('gpsStatus').style.display = 'flex';
    document.getElementById('gpsStatus').innerHTML =
      '<span>MAP FAILED TO LOAD<br><span style="font-size:10px">' +
      (mapErr && mapErr.message ? mapErr.message : 'Unknown error') +
      '<br>Speed/heading/media still work</span></span>';
  }

  var gotFix = false;

  // ---------------- GEOLOCATION ----------------
  function metersToMph(mps){ return mps * 2.23694; }

  function haversineMeters(a,b){
    var R=6371000;
    var dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
    var la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
    var h=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(h));
  }

  var geoStarted = false;
  var geoWatchId = null;

  function startGeolocation(){
    if(geoStarted) return;
    geoStarted = true;

    if(!navigator.geolocation){
      document.getElementById('gpsStatus').innerHTML = '<span>GEOLOCATION NOT SUPPORTED</span>';
      return;
    }

    document.getElementById('gpsStatus').innerHTML = '<span>ACQUIRING GPS FIX&hellip;</span>';

    geoWatchId = navigator.geolocation.watchPosition(function(pos){
      var c = pos.coords;
      var here = {lat:c.latitude, lng:c.longitude};

      if(!gotFix){
        gotFix = true;
        document.getElementById('gpsStatus').style.display='none';
        if(map){ map.setView(here, 17); }
      } else {
        if(map){ map.panTo(here, {animate:false}); }
      }

      // speed
      if(c.speed !== null && c.speed !== undefined && !isNaN(c.speed)){
        currentSpeedMph = Math.max(0, metersToMph(c.speed));
      } else if(lastFix){
        var dist = haversineMeters(lastFix.pos, here);
        var dt = (pos.timestamp - lastFix.t)/1000;
        if(dt > 0){ currentSpeedMph = Math.max(0, metersToMph(dist/dt)); }
      }
      lastFix = {pos:here, t:pos.timestamp};

      // heading fallback from GPS course-over-ground
      if(c.heading !== null && c.heading !== undefined && !isNaN(c.heading)){
        gpsHeading = c.heading;
      }
      updateSpeedUI();
    }, function(err){
      var msg = 'GPS ERROR';
      if(err.code === 1) msg = 'LOCATION PERMISSION DENIED<br><span style="font-size:10px">Press a button again to retry,<br>or check the Meta AI app\'s<br>site permissions for this app</span>';
      else if(err.code === 2) msg = 'POSITION UNAVAILABLE<br><span style="font-size:10px">Check phone is online & GPS is on</span>';
      else if(err.code === 3) msg = 'GPS TIMED OUT<br><span style="font-size:10px">Retrying&hellip;</span>';
      document.getElementById('gpsStatus').style.display = 'flex';
      document.getElementById('gpsStatus').innerHTML = '<span>' + msg + '</span>';
      geoStarted = false; // allow retry on next button press
    }, { enableHighAccuracy:true, maximumAge:1000, timeout:15000 });
  }

  // ---------------- COMPASS / ORIENTATION ----------------
  // Raw sensor readings are just recorded here, not rendered immediately —
  // rendering rapid magnetometer jitter straight to a rotating map is what
  // causes that spinning/dizzy feeling, especially in a moving vehicle
  // where the compass is noisiest. Rendering is handled by headingTick().
  var rawCompassHeading = null;

  function handleOrientation(e){
    var heading = null;
    if(typeof e.webkitCompassHeading === 'number'){
      heading = e.webkitCompassHeading; // iOS, already true-north referenced
    } else if(e.absolute && e.alpha !== null){
      heading = 360 - e.alpha;
    }
    if(heading !== null && !isNaN(heading)){
      rawCompassHeading = (heading + 360) % 360;
      lastCompassUpdate = Date.now();
    }
  }

  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', handleOrientation, true);

  function requestOrientationPermission(){
    if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
      DeviceOrientationEvent.requestPermission().catch(function(){});
    }
  }

  // shortest signed distance from a to b around a circle, in degrees
  function angleDiff(a, b){
    return ((b - a + 540) % 360) - 180;
  }

  var HEADING_TICK_MS   = 450;  // how often we re-render heading (was every sensor event, ~30-60Hz)
  var HEADING_SMOOTHING = 0.22; // lower = smoother/slower to catch up, higher = snappier
  var HEADING_DEADBAND  = 4;    // degrees of drift required before we bother re-rendering
  var GPS_HEADING_SPEED_THRESHOLD = 3; // mph — above this, trust GPS course over the compass

  var lastAppliedHeading = 0;

  // Renders on a fixed slow cadence instead of on every raw sensor event,
  // and prefers GPS course-over-ground while moving (it's far steadier
  // than a magnetometer in a car) — the compass is only used when stationary
  // or slow. Smoothing + a deadband stop small jitter from re-triggering
  // the map rotation.
  setInterval(function(){
    var target = null;
    var compassFresh = (Date.now() - lastCompassUpdate) < 3000;
    var movingEnoughForGps = currentSpeedMph >= GPS_HEADING_SPEED_THRESHOLD && gpsHeading !== null;

    if(movingEnoughForGps){ target = gpsHeading; }
    else if(compassFresh && rawCompassHeading !== null){ target = rawCompassHeading; }
    else if(gpsHeading !== null){ target = gpsHeading; }

    if(target === null) return;

    currentHeading = (currentHeading + angleDiff(currentHeading, target) * HEADING_SMOOTHING + 360) % 360;

    if(Math.abs(angleDiff(lastAppliedHeading, currentHeading)) >= HEADING_DEADBAND){
      lastAppliedHeading = currentHeading;
      applyHeading();
    }
  }, HEADING_TICK_MS);

  function applyHeading(){
    drawHeadingTape(currentHeading);
    var marker = document.querySelector('#userMarker svg');
    if(headingUp){
      document.getElementById('mapRotator').style.transform = 'rotate(' + (-currentHeading) + 'deg)';
      marker.style.transform = 'rotate(0deg)';
    } else {
      document.getElementById('mapRotator').style.transform = 'rotate(0deg)';
      marker.style.transform = 'rotate(' + currentHeading + 'deg)';
    }
  }

  // ---------------- HEADING TAPE DRAW ----------------
  var hCanvas = document.getElementById('headingCanvas');
  var hCtx = hCanvas.getContext('2d');
  var PX_PER_DEG = 5.2;

  function cardinal(deg){
    var dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg/45)%8];
  }

  function drawHeadingTape(heading){
    hCtx.clearRect(0,0,600,52);
    hCtx.strokeStyle = 'rgba(61,255,160,0.55)';
    hCtx.fillStyle = 'rgba(61,255,160,0.85)';
    hCtx.font = '11px ui-monospace, monospace';
    hCtx.textAlign = 'center';

    for(var d = -50; d <= 50; d += 5){
      var deg = Math.round((heading + d + 360) % 360);
      var x = 300 + d*PX_PER_DEG;
      var isMajor = deg % 30 === 0;
      var isMinor = deg % 10 === 0;
      var h = isMajor ? 18 : (isMinor ? 12 : 7);
      hCtx.lineWidth = isMajor ? 1.5 : 1;
      hCtx.beginPath();
      hCtx.moveTo(x, 0);
      hCtx.lineTo(x, h);
      hCtx.stroke();
      if(isMajor){
        var label = (deg % 90 === 0) ? cardinal(deg) : String(deg);
        hCtx.fillText(label, x, 32);
      }
    }
    document.getElementById('headingPointer');
  }
  drawHeadingTape(0);

  // ---------------- SPEED TAPE DRAW ----------------
  var sCanvas = document.getElementById('speedCanvas');
  var sCtx = sCanvas.getContext('2d');
  var PX_PER_MPH = 9;

  function drawSpeedTape(speed){
    sCtx.clearRect(0,0,70,530);
    sCtx.strokeStyle = 'rgba(61,255,160,0.5)';
    sCtx.fillStyle = 'rgba(61,255,160,0.8)';
    sCtx.font = '10px ui-monospace, monospace';
    sCtx.textAlign = 'left';

    for(var v = -30; v <= 30; v += 5){
      var mph = Math.round(speed + v);
      if(mph < 0) continue;
      var y = 265 - v*PX_PER_MPH;
      var isMajor = mph % 10 === 0;
      var w = isMajor ? 16 : 9;
      sCtx.lineWidth = isMajor ? 1.5 : 1;
      sCtx.beginPath();
      sCtx.moveTo(0, y);
      sCtx.lineTo(w, y);
      sCtx.stroke();
      if(isMajor){ sCtx.fillText(String(mph), 20, y+3.5); }
    }
  }
  drawSpeedTape(0);

  function updateSpeedUI(){
    drawSpeedTape(currentSpeedMph);
    document.getElementById('speedNum').textContent = Math.round(currentSpeedMph);
  }

  // ---------------- MODE TOGGLE ----------------
  var compassBtn = document.getElementById('compassBtn');
  function toggleMode(){
    headingUp = !headingUp;
    localStorage.setItem('bearing-mode', headingUp ? 'headingUp' : 'northUp');
    document.getElementById('modeLabel').textContent = headingUp ? 'HEADING UP' : 'NORTH UP';
    compassBtn.querySelector('.sub').textContent = headingUp ? '◀ HEADING UP ▶' : '◀ NORTH UP ▶';
    applyHeading();
  }
  (function initModeLabel(){
    document.getElementById('modeLabel').textContent = headingUp ? 'HEADING UP' : 'NORTH UP';
    compassBtn.querySelector('.sub').textContent = headingUp ? '◀ HEADING UP ▶' : '◀ NORTH UP ▶';
  })();

  // ---------------- MEDIA CONTROL ----------------
  var mediaBtn = document.getElementById('mediaBtn');

  function setPlaybackState(playing){
    isPlaying = playing;
    mediaBtn.innerHTML = playing ? '&#10073;&#10073;' : '&#9654;';
    if(playing){ silentAudio.play().catch(function(){}); }
    else { silentAudio.pause(); }
    if('mediaSession' in navigator){
      navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
    }
  }

  if('mediaSession' in navigator){
    navigator.mediaSession.setActionHandler('play', function(){ setPlaybackState(true); });
    navigator.mediaSession.setActionHandler('pause', function(){ setPlaybackState(false); });
    try{
      navigator.mediaSession.metadata = new MediaMetadata({ title:'Bearing', artist:'MRBD' });
    }catch(e){}
  }
  setPlaybackState(false);

  function toggleMedia(){ setPlaybackState(!isPlaying); }

  applyHeading();

})();
</script>
</body>
</html>
